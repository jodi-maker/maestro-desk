name: Prod inspect (Neon)

# Read-only inspector for the PRODUCTION Neon DB. Prints a summary of
# workspaces, platform admins, and whether a given admin email exists +
# whether it has a password credential. Runs ONLY SELECTs — it never writes.
#
# Why this exists: before bootstrapping prod (first platform-admin + real
# workspace) we need to see what's already there, without piping the prod
# connection string through a chat or a laptop. This reuses the same
# `production` environment secret the migrate workflow uses, so the
# DATABASE_URL never leaves CI.
#
# Manual only — there is no push trigger. Run it from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      check_email:
        description: 'Email to look up specifically (platform-admin candidate)'
        required: false
        default: 'jodi@weezboo.com'

concurrency:
  group: prod-inspect-neon
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  inspect:
    name: inspect prod (read-only)
    runs-on: ubuntu-latest
    # Same gate as migrate.yml: DATABASE_URL is an environment secret on
    # `production`, restricted to the `main` branch — so a dispatch from any
    # other branch cannot read it.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13" # match .github/workflows/ci.yml

      - name: Install API deps
        working-directory: api
        run: bun install --frozen-lockfile

      - name: Inspect prod Neon (read-only)
        working-directory: api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CHECK_EMAIL: ${{ inputs.check_email }}
        run: bun run scripts/prod-inspect.ts
