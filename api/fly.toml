# Fly.io config for the maestro-desk API. Deploy from this dir: `fly deploy`.
# Region fra (Frankfurt) is closest to the Supabase eu-central-1 project.
#
# IMPORTANT: this app runs background workers (webhook delivery + CSAT
# reminders) that poll continuously, so it must NOT scale to zero — keep
# auto_stop_machines = "off" and min_machines_running = 1, and run exactly one
# machine (the workers assume a single process; see the FOR UPDATE SKIP LOCKED
# note in index.ts before scaling past 1).
#
# Secrets are NOT in this file — set them with `fly secrets set` (see PROD_SETUP.md):
#   SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, ANTHROPIC_API_KEY,
#   POSTMARK_INBOUND_SECRET, POSTMARK_SERVER_TOKEN, POSTMARK_OUTBOUND_FROM,
#   POSTMARK_ACCOUNT_TOKEN, POSTMARK_INBOUND_REPLY_ADDRESS, PORTAL_BASE_URL

app = "maestro-desk-api"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
